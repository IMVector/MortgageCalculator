name: Build iOS App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build and Archive
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.2'

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build App
        run: |
          xcodebuild \
            -project MortgageCalculator.xcodeproj \
            -scheme MortgageCalculator \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/MortgageCalculator.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO

      - name: Create IPA (Unsigned)
        run: |
          mkdir -p build/Payload
          cp -r build/MortgageCalculator.xcarchive/Products/Applications/MortgageCalculator.app build/Payload/
          cd build
          zip -r MortgageCalculator.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MortgageCalculator-IPA
          path: build/MortgageCalculator.ipa
          retention-days: 30

      - name: Create Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          files: build/MortgageCalculator.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
